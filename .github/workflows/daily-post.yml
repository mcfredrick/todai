name: Daily AI Digest

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write

jobs:
  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard — skip agents if today's post already exists
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          if [ -f "$POST" ]; then
            echo "Post $POST already exists, skipping agents."
            echo "SKIP_AGENTS=true" >> "$GITHUB_ENV"
          fi

      - name: Select models
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/model_selector.py

      - name: Run research agent
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/research_agent.py

      - name: Cooldown between agents
        if: env.SKIP_AGENTS != 'true'
        run: sleep 90  # Let free-tier rate limit window reset after research agent

      - name: Run writing agent
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/writing_agent.py

      - name: Commit post and seen.json
        if: env.SKIP_AGENTS != 'true'
        run: |
          git config user.name "tenkai-bot"
          git config user.email "tenkai-bot@users.noreply.github.com"
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          git add "$POST" agents/seen.json
          git commit -m "post: $(date -u +%Y-%m-%d) daily digest [skip ci]"
          git push

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.139.0'
          extended: false

      - name: Build Hugo site
        run: hugo --minify

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: ''  # Set to your custom domain if needed, e.g. tenkai.example.com

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily digest failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily post workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bot-failure'],
            })
