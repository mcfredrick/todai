name: Daily AI Digest

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC daily
  workflow_dispatch:
    inputs:
      skip_research:
        description: 'Skip research agent and reuse cached research.json from last run'
        type: boolean
        default: false

permissions:
  contents: write
  issues: write

jobs:
  publish:
    uses: ./.github/workflows/publish.yml
    needs: generate-post
    secrets: inherit

  generate-post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Guard — skip agents if today's post already exists
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          if [ -f "$POST" ]; then
            echo "Post $POST already exists, skipping agents."
            echo "SKIP_AGENTS=true" >> "$GITHUB_ENV"
          fi

      - name: Select models
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/model_selector.py

      - name: Restore cached research.json
        if: env.SKIP_AGENTS != 'true' && inputs.skip_research
        uses: actions/download-artifact@v4
        with:
          name: research-json
          path: /tmp

      - name: Run research agent
        if: env.SKIP_AGENTS != 'true' && !inputs.skip_research
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python agents/research_agent.py

      - name: Upload research.json as artifact
        if: env.SKIP_AGENTS != 'true' && !inputs.skip_research
        uses: actions/upload-artifact@v4
        with:
          name: research-json
          path: /tmp/research.json
          retention-days: 7

      - name: Cooldown between agents
        if: env.SKIP_AGENTS != 'true' && !inputs.skip_research
        run: sleep 90  # Let free-tier rate limit window reset after research agent

      - name: Run writing agent and validate (with retry)
        if: env.SKIP_AGENTS != 'true'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          for attempt in 1 2 3; do
            echo "=== Writing attempt $attempt ==="
            python agents/writing_agent.py
            if python agents/validate_post.py "$POST"; then
              echo "Validation passed on attempt $attempt"
              exit 0
            fi
            echo "Validation failed, retrying writing agent in 30s..."
            sleep 30
          done
          echo "All writing attempts failed validation"
          exit 1

      - name: Cache fastembed model
        uses: actions/cache@v4
        with:
          path: ~/.cache/fastembed
          key: fastembed-bge-small-en-v1.5

      - name: Build search index
        if: env.SKIP_AGENTS != 'true'
        run: python agents/build_index.py

      - name: Commit post, seen.json, and search index
        if: env.SKIP_AGENTS != 'true'
        run: |
          git config user.name "tenkai-bot"
          git config user.email "tenkai-bot@users.noreply.github.com"
          POST="content/posts/$(date -u +%Y-%m-%d).md"
          git add "$POST" agents/seen.json static/search-index.json
          git commit -m "post: $(date -u +%Y-%m-%d) daily digest [skip ci]"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Daily digest failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The daily post workflow failed. [View run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              labels: ['bot-failure'],
            })
