name: Publish tenkai-mcp to npm

on:
  push:
    branches: [main]
    paths:
      - 'mcp/**'
  workflow_dispatch:

permissions:
  id-token: write  # required for npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          token: ''  # empty so setup-node doesn't export GITHUB_TOKEN as NODE_AUTH_TOKEN

      - name: Check if version is new
        id: version_check
        working-directory: mcp
        run: |
          LOCAL=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view tenkai-mcp version 2>/dev/null || echo "none")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT
          if [ "$LOCAL" != "$PUBLISHED" ]; then
            echo "should_publish=true" >> $GITHUB_OUTPUT
          else
            echo "should_publish=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: mcp
        run: npm install

      - name: Publish to npm
        if: steps.version_check.outputs.should_publish == 'true'
        working-directory: mcp
        run: npm publish --provenance --access public

      - name: Skip (version already published)
        if: steps.version_check.outputs.should_publish == 'false'
        run: echo "Version ${{ steps.version_check.outputs.local }} already on npm — bump mcp/package.json version to publish."
