{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1 class="post-title">Search</h1>
  </header>
  <div class="search-container">
    <form id="search-form">
      <input
        id="search-input"
        type="text"
        placeholder="Ask anything about AI, tools, research&#x2026;"
        autocomplete="off"
        autofocus
      />
      <button type="submit">[GO]</button>
    </form>
    <div id="search-status" class="search-status"></div>
    <div id="search-results"></div>
  </div>
</article>
<script src="{{ "search.js" | relURL }}" type="module"></script>
{{ end }}
